<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Tech | AI Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-gray-800 rounded-2xl shadow-2xl border border-gray-700 overflow-hidden">
        <div class="bg-blue-600 p-6 text-center">
            <h1 class="text-2xl font-bold">Asistente Alpha Tech Chile</h1>
            <p class="text-blue-100 text-sm">Consulta nuestro catálogo inteligente</p>
        </div>

        <div class="p-6">
            <form method="POST" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">¿En qué puedo ayudarte?</label>
                    <input type="text" name="query" required
                           placeholder="Ej: Busco un cargador de iPhone rápido por menos de $20.000"
                           class="w-full px-4 py-3 rounded-xl bg-gray-700 border border-gray-600 focus:border-blue-500 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-white">
                </div>
                <button type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl shadow-lg transform active:scale-95 transition-all">
                    Consultar Catálogo
                </button>
            </form>

            {% if response %}
            <div class="mt-8 space-y-4 animate-fade-in">
                <div class="flex flex-col space-y-2">
                    <span class="text-xs font-bold text-blue-400 uppercase tracking-widest">Respuesta de Gemini:</span>
                    <div class="bg-gray-700 p-5 rounded-2xl border-l-4 border-blue-500 text-gray-200 leading-relaxed shadow-inner">
                        {{ response|linebreaks }}
                    </div>
                </div>
                <a href="/" class="block text-center text-sm text-gray-500 hover:text-white transition">Limpiar consulta</a>
            </div>
            {% endif %}
        </div>
    </div>

    <footer class="mt-8 text-gray-500 text-xs">
        &copy; 2026 Alpha Tech Chile - Desarrollado por Jairo Maldonado
    </footer>

</body>
</html>
